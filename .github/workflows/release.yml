name: Release Tauri App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
            label: Windows
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            label: macOS
          - platform: ubuntu-22.04
            args: ""
            label: Linux

    runs-on: ${{ matrix.platform }}
    name: Build for ${{ matrix.label }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Install npm deps
        # See ci.yml for why npm install is preferred over npm ci.
        run: npm install --no-audit --no-fund

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signing keys for the auto-updater. Set these as repo secrets:
          #   TAURI_SIGNING_PRIVATE_KEY          - contents of the .key file
          #   TAURI_SIGNING_PRIVATE_KEY_PASSWORD - empty string if generated without password
          # When present, tauri-action also publishes `latest.json` (the
          # update manifest read by the in-app updater) alongside the
          # platform installers.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Slide Forge ${{ github.ref_name }}"
          releaseBody: |
            自動ビルドされた Slide Forge ${{ github.ref_name }} のインストーラ。

            **ダウンロード**:
            - Windows: `*.msi` または `*-setup.exe`
            - macOS:   `*.dmg`
            - Linux:   `*.AppImage` または `*.deb`

            **初回起動の注意**: Windows / macOS で「不明な発行元」警告が出ます。OSS のためコード署名なし。
            - Windows: 「詳細情報」→「実行」
            - macOS:   右クリック →「開く」
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
