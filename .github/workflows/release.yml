name: Release Tauri App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
            label: Windows
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            label: macOS
          - platform: ubuntu-22.04
            args: ""
            label: Linux

    runs-on: ${{ matrix.platform }}
    name: Build for ${{ matrix.label }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Install npm deps
        # See ci.yml for why npm install is preferred over npm ci.
        run: npm install --no-audit --no-fund

      - name: Disable updater artifacts when signing key is not configured
        # The Secrets `TAURI_SIGNING_PRIVATE_KEY` and `TAURI_SIGNING_
        # PRIVATE_KEY_PASSWORD` must be set on the repo for the in-app
        # updater to work. If they're missing, tauri-action would
        # otherwise try to use empty strings and fail with
        # "failed to decode secret key". Detect that case here and
        # patch tauri.conf.json to skip updater-artifact generation,
        # so workflow_dispatch / pre-release-tagged builds still
        # complete successfully — they just won't carry latest.json.
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::warning::TAURI_SIGNING_PRIVATE_KEY is not set — disabling updater artifacts for this build."
            node -e "
              const fs = require('fs');
              const path = 'src-tauri/tauri.conf.json';
              const c = JSON.parse(fs.readFileSync(path, 'utf8'));
              if (c.bundle) c.bundle.createUpdaterArtifacts = false;
              fs.writeFileSync(path, JSON.stringify(c, null, 2));
            "
          else
            echo 'TAURI_SIGNING_PRIVATE_KEY detected — full signed release with updater manifest.'
          fi

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signing keys for the auto-updater. Optional: when both are
          # missing, the previous step disables updater artifacts so
          # the build still produces installers. When present, tauri-
          # action publishes `latest.json` alongside the installers.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Slide Forge ${{ github.ref_name }}"
          releaseBody: |
            自動ビルドされた Slide Forge ${{ github.ref_name }} のインストーラ。

            **ダウンロード**:
            - Windows: `*.msi` または `*-setup.exe`
            - macOS:   `*.dmg`
            - Linux:   `*.AppImage` または `*.deb`

            **初回起動の注意**: Windows / macOS で「不明な発行元」警告が出ます。OSS のためコード署名なし。
            - Windows: 「詳細情報」→「実行」
            - macOS:   右クリック →「開く」
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
